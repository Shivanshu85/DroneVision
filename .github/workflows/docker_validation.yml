name: Docker Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-validate:
    name: Build & Verify Docker Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          tags: dronevision-validate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Docker Container
        run: |
          docker run -d --name test-demo -p 7860:7860 dronevision-validate:latest

      - name: Verify Container Startup
        run: |
          echo "Waiting for Gradio application to start..."
          # Poll the web service for up to 30 seconds
          for i in {1..30}; do
            if curl -s -f http://localhost:7860/ > /dev/null; then
              echo "Gradio application is up and responding!"
              exit 0
            fi
            sleep 1
          done
          echo "Error: Gradio application failed to respond on port 7860 within 30 seconds"
          docker logs test-demo
          exit 1

      - name: Clean up Container
        if: always()
        run: |
          docker stop test-demo || true
          docker rm test-demo || true
