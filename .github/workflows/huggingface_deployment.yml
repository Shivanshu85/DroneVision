name: Hugging Face Deployment

on:
  push:
    branches: [ main ]
    paths:
      - 'dronevision/**'
      - 'demo/**'
      - 'configs/**'
      - 'requirements/**'
      - 'app.py'
      - 'requirements.txt'
      - 'VERSION'
      - '.gitattributes'
      - '.github/workflows/huggingface_deployment.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Git config
        run: |
          echo "Setting up global git username and email config..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "Git config setup complete."

      - name: Isolate Space Deployment Contents
        run: |
          echo "Starting demo isolation process..."
          mkdir hf_space
          
          echo "Copying runtime source directories..."
          cp -r dronevision hf_space/
          cp -r demo hf_space/
          cp -r configs hf_space/
          
          echo "Re-creating checkpoint paths and copying best.pth..."
          mkdir -p hf_space/runs/phase1
          cp runs/phase1/best.pth hf_space/runs/phase1/best.pth
          
          echo "Copying root files and gitattributes..."
          cp app.py hf_space/
          cp VERSION hf_space/
          cp .gitattributes hf_space/

          echo "Generating flat, self-contained requirements.txt for Hugging Face Spaces..."
          cat << 'EOF' > hf_space/requirements.txt
          torch>=2.2.0
          torchvision>=0.17.0
          numpy>=1.26.0
          opencv-python-headless>=4.9.0
          Pillow>=10.3.0
          pyyaml>=6.0.1
          scipy>=1.13.0
          tqdm>=4.66.4
          gradio>=6.19.0
          fastapi>=0.111.0
          uvicorn>=0.29.0
          EOF

          echo "Creating packages.txt for system dependencies..."
          cat << 'EOF' > hf_space/packages.txt
          libgl1
          libglib2.0-0
          EOF
          
          echo "Creating Hugging Face Spaces README.md metadata header..."
          cat << 'EOF' > hf_space/README.md
          ---
          title: DroneVision
          emoji: 🚁
          colorFrom: blue
          colorTo: indigo
          sdk: gradio
          sdk_version: 6.19.0
          app_file: app.py
          pinned: false
          ---
          
          # DroneVision
          
          Custom single-class drone detection and counting system built entirely from scratch with PyTorch.
          EOF
          echo "Demo isolation process successfully completed."

      - name: Validate Space Deployment Package
        run: |
          echo "Validating isolated space contents..."
          
          # Check for essential files
          for f in hf_space/app.py hf_space/README.md hf_space/requirements.txt hf_space/packages.txt hf_space/VERSION hf_space/.gitattributes hf_space/runs/phase1/best.pth; do
            if [ ! -f "$f" ]; then
              echo "Error: Validation failed! Missing required file: $f"
              exit 1
            fi
          done
          
          # Check for essential directories
          for d in hf_space/dronevision hf_space/demo hf_space/configs; do
            if [ ! -d "$d" ]; then
              echo "Error: Validation failed! Missing required directory: $d"
              exit 1
            fi
          done
          
          # Check for nested requirement references in the generated file
          if grep -q "\-r " hf_space/requirements.txt; then
            echo "Error: Validation failed! Generated requirements.txt contains nested '-r' references."
            exit 1
          fi
          
          echo "Validation succeeded! Space deployment package is complete and optimized."

      - name: Push isolated space to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Checking Hugging Face Token presence..."
          if [ -z "${HF_TOKEN}" ]; then
            echo "Error: HF_TOKEN secret is empty or missing! Please configure it in your GitHub Repository settings."
            exit 1
          fi
          
          echo "Entering deployment folder and initializing Git repository..."
          cd hf_space
          git init
          
          echo "Initializing Git LFS tracking..."
          git lfs install
          
          echo "Switching to main branch..."
          git checkout -b main
          
          echo "Adding remote origin for space spaces/sam9507/DroneVision..."
          git remote add origin https://oauth2:${HF_TOKEN}@huggingface.co/spaces/sam9507/DroneVision
          
          echo "Adding files to repository index..."
          git add -A
          
          echo "Creating local deployment commit..."
          git commit -m "Deploying DroneVision demo version $(cat VERSION) via GitHub Actions"
          
          echo "Pushing commits to Hugging Face Spaces remote repository..."
          if git push -f origin main; then
            echo "Hugging Face Spaces deployment successfully completed!"
          else
            echo "Error: Failed to push to Hugging Face Spaces repository remote."
            exit 1
          fi

