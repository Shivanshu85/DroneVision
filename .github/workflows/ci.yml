name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    name: Lint & Format Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-name: '3.11'
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff Lint Check
        run: ruff check .

      - name: Run Ruff Format Check
        run: ruff format --check .

  security-audit:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-name: '3.11'
          python-version: '3.11'
          cache: 'pip'

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit Security Check
        run: bandit -r dronevision/ scripts/ -c pyproject.toml || true

      - name: Run pip-audit Dependency Scan
        run: pip-audit || true

  test:
    name: Run PyTest Suite
    needs: [lint-and-format]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-name: '3.11'
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -e .

      - name: Validate Package Imports
        run: |
          python -c "import dronevision"
          python -c "from dronevision.models.detector import DroneDetector"
          python -c "from demo.predictor import DemoPredictor"

      - name: Validate Dependencies Resolution
        run: |
          pip check

      - name: Run Test Suite with Coverage
        run: |
          pytest tests/ --cov=dronevision --cov-report=xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.xml
