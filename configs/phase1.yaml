# =============================================================================
# DroneVision — Phase 1 Training Configuration
# Purpose : Primary model training
# Image   : 640x640
# Batch   : 4   (6 GB VRAM)
# Epochs  : 50
# Target  : mAP50 >= 0.80
# =============================================================================

model:
  image_size: 640
  num_classes: 1                  # 0 = Drone (UAV)
  num_anchors: 3                  # anchors per scale
  strides: [8, 16, 32]           # detection scale strides

  # Anchors tuned for DUT Anti-UAV at 640x640 image size.
  # 3 groups (one per detection scale), 3 anchor (w,h) pairs each.
  # Units: pixels in the 640x640 input space.
  # DUT Anti-UAV UAVs range from ~5px (distant) to ~160px (close).
  # Refine with: python scripts/analyze_dataset.py --suggest-anchors
  anchors:
    - [[6, 6],    [10, 10],  [16, 16]]   # P3 stride-8  — very small drones
    - [[24, 24],  [38, 38],  [56, 56]]   # P4 stride-16 — medium drones
    - [[80, 80],  [110, 110], [160, 160]] # P5 stride-32 — large/close drones

  # Backbone channels (small, ~2M total params for 6 GB VRAM budget)
  backbone_channels: [32, 64, 128, 256]

  # Neck output channels per scale [N3, N4, N5]
  neck_channels: [64, 128, 128]

data:
  train: datasets/images/train
  val:   datasets/images/val
  test:  datasets/images/test
  label_dir: datasets/labels
  num_workers: 0          # 0 = main process only (required on Windows)
  pin_memory: true        # enabled: CUDA GPU available

  class_names:
    0: "drone"

augmentation:
  enabled: true
  horizontal_flip: 0.5
  vertical_flip:   0.3
  color_jitter:    0.8
  mosaic:          0.5
  mixup:           0.15
  random_scale:    0.5
  gaussian_blur:   0.2

train:
  epochs: 50
  batch_size: 4
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0005
  momentum: 0.937
  warmup_epochs: 3
  scheduler: cosine
  mixed_precision: true         # enabled: RTX 3050 CUDA GPU available
  gradient_clip: 10.0
  seed: 42
  checkpoint_dir: runs/phase1
  save_period: 5                # save checkpoint every N epochs

loss:
  lambda_box: 7.5
  lambda_obj: 1.0
  lambda_cls: 0.5
  anchor_threshold: 4.0
  obj_pos_weight: 1.0
  cls_pos_weight: 1.0

inference:
  conf_threshold: 0.25
  iou_threshold:  0.45

logging:
  mlflow_tracking_uri: sqlite:///mlruns/mlflow.db
  experiment_name: dronevision_phase1
  log_interval: 10
