version: '3.8'

services:
  demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: dronevision-demo:1.0.0
    container_name: dronevision-gradio-demo
    ports:
      - "7860:7860"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    restart: unless-stopped
